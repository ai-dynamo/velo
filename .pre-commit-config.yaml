repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
  - id: check-toml
  - id: check-yaml
    args: ['--allow-multiple-documents']
  - id: check-merge-conflict
  - id: trailing-whitespace
  - id: mixed-line-ending
  - id: end-of-file-fixer

- repo: local
  hooks:
  - id: cargo-fmt
    name: cargo fmt
    entry: cargo fmt --
    language: system
    types: [rust]
    pass_filenames: false
