  test:
    name: Tests
    runs-on: stg-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.2
    permissions:
      contents: read
    env:
      NATS_URL: nats://127.0.0.1:4222
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    services:
      nats:
        image: nats:latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Install protoc
      run: |
        if ! command -v protoc >/dev/null 2>&1; then
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch_64/')
          PROTOC_ZIP="protoc-${PROTOC_VERSION}-linux-${ARCH}.zip"
          curl -fsSLO "$PB_REL/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          unzip "${PROTOC_ZIP}" -d $HOME/.local
          rm "${PROTOC_ZIP}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        fi
    - name: Install system dependencies
      run: |
        pkgs=""
        command -v cmake >/dev/null 2>&1 || pkgs="$pkgs cmake"
        command -v mold  >/dev/null 2>&1 || pkgs="$pkgs mold"
        command -v clang >/dev/null 2>&1 || pkgs="$pkgs clang"
        [ -z "$pkgs" ] || { sudo apt-get update -qq && sudo apt-get install -y -qq $pkgs; }
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/
          ~/.cargo/git/
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-registry-
    - name: Verify Cargo.lock is in sync
      run: cargo metadata --locked --format-version 1 > /dev/null
    - name: Compile and run tests
      run: cargo test --locked --all-features --all-targets

  coverage:
    name: Coverage
    runs-on: stg-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.2
    permissions:
      contents: read
    env:
      NATS_URL: nats://127.0.0.1:4222
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    services:
      nats:
        image: nats:latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Install protoc
      run: |
        if ! command -v protoc >/dev/null 2>&1; then
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch_64/')
          PROTOC_ZIP="protoc-${PROTOC_VERSION}-linux-${ARCH}.zip"
          curl -fsSLO "$PB_REL/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          unzip "${PROTOC_ZIP}" -d $HOME/.local
          rm "${PROTOC_ZIP}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        fi
    - name: Install system dependencies
      run: |
        pkgs=""
        command -v cmake >/dev/null 2>&1 || pkgs="$pkgs cmake"
        command -v mold  >/dev/null 2>&1 || pkgs="$pkgs mold"
        command -v clang >/dev/null 2>&1 || pkgs="$pkgs clang"
        [ -z "$pkgs" ] || { sudo apt-get update -qq && sudo apt-get install -y -qq $pkgs; }
    - name: Cache cargo registry and tools
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/
          ~/.cargo/git/
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-registry-
    - name: Install cargo-llvm-cov
      run: command -v cargo-llvm-cov >/dev/null 2>&1 || cargo install cargo-llvm-cov --locked
    - name: Add llvm-tools component
      run: rustup component list --installed | grep -q '^llvm-tools' || rustup component add llvm-tools-preview
    - name: Generate coverage
      run: cargo llvm-cov --all-features --workspace --codecov --output-path codecov.json
    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: codecov.json
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

