name: CI

on:
  push:
    branches:
    - main
  pull_request:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: "30.2"

jobs:
  fmt:
    name: Formatting
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Add rustfmt component
      run: rustup component list --installed | grep -q '^rustfmt' || rustup component add rustfmt
    - name: Check formatting
      run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Rust setup
      uses: ./.github/actions/rust-setup
    - name: sccache setup
      uses: ./.github/actions/sccache-setup
      with:
        bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
    - name: Add clippy component
      run: rustup component list --installed | grep -q '^clippy' || rustup component add clippy
    - name: Run clippy
      run: cargo clippy --no-deps --all-features --all-targets -- -D warnings
    - name: Install cargo-machete
      run: |
        cargo-machete --version 2>/dev/null | grep -qF '0.9.1' || cargo install cargo-machete@0.9.1 --locked
    - name: Run cargo-machete
      run: cargo machete
    - name: sccache stats
      if: always()
      run: /tmp/use-sccache.sh show-stats "clippy" || true

  deny:
    name: Cargo Deny
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Cache cargo registry and tools
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/
          ~/.cargo/git/
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-registry-
    - name: Install cargo-deny
      run: |
        cargo-deny --version 2>/dev/null | grep -qF '0.19.0' || cargo install cargo-deny@0.19.0 --locked
    - name: Run cargo-deny
      run: cargo-deny -L error --all-features check licenses bans

  test:
    name: Tests
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    env:
      NATS_URL: nats://127.0.0.1:4222
      ETCD_URL: http://127.0.0.1:2379
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    services:
      nats:
        image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/nats-jetstream:2.12.6v1
      etcd:
        image: quay.io/coreos/etcd:v3.5.0
        env:
          ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
          ETCD_ADVERTISE_CLIENT_URLS: "http://127.0.0.1:2379"
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Rust setup
      uses: ./.github/actions/rust-setup
    - name: sccache setup
      uses: ./.github/actions/sccache-setup
      with:
        bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
    - name: Verify Cargo.lock is in sync
      run: cargo metadata --locked --format-version 1 > /dev/null
    - name: Compile and run tests
      run: cargo test --locked --all-features --all-targets
    - name: sccache stats
      if: always()
      run: /tmp/use-sccache.sh show-stats "tests" || true

  coverage:
    name: Coverage
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    env:
      NATS_URL: nats://127.0.0.1:4222
      ETCD_URL: http://127.0.0.1:2379
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    services:
      nats:
        image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/nats-jetstream:2.12.6v1
      etcd:
        image: quay.io/coreos/etcd:v3.5.0
        env:
          ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
          ETCD_ADVERTISE_CLIENT_URLS: "http://127.0.0.1:2379"
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Rust setup
      uses: ./.github/actions/rust-setup
    - name: sccache setup
      uses: ./.github/actions/sccache-setup
      with:
        bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
    - name: Install cargo-llvm-cov if missing
      run: |
        cargo-llvm-cov --version 2>/dev/null | grep -qF '0.8.5' || cargo install cargo-llvm-cov@0.8.5 --locked
    - name: Add llvm-tools component
      run: rustup component list --installed | grep -q '^llvm-tools' || rustup component add llvm-tools-preview
    - name: Generate coverage
      run: cargo llvm-cov --all-features --all-targets --workspace --codecov --output-path codecov.json
    - name: sccache stats
      if: always()
      run: /tmp/use-sccache.sh show-stats "coverage" || true
    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: codecov.json
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  examples:
    name: Examples
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Rust setup
      uses: ./.github/actions/rust-setup
    - name: sccache setup
      uses: ./.github/actions/sccache-setup
      with:
        bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
    - name: Build examples (release)
      run: cargo build --manifest-path examples/Cargo.toml --release --all-features --examples --locked
    # Examples run sequentially — each one binds loopback sockets and the
    # next step must not race for the same port or socket.
    - name: Run ping_pong
      timeout-minutes: 2
      run: cargo run --manifest-path examples/Cargo.toml --release --all-features --example ping_pong --locked -- --rounds 200
    - name: Run throughput
      timeout-minutes: 3
      run: cargo run --manifest-path examples/Cargo.toml --release --all-features --example throughput --locked -- --count 1000 --payload-sizes 0,1024 --concurrency 1,10
    - name: Run mpsc_fanin
      timeout-minutes: 2
      run: cargo run --manifest-path examples/Cargo.toml --release --all-features --example mpsc_fanin --locked -- --producers 4 --items 40
    - name: sccache stats
      if: always()
      run: /tmp/use-sccache.sh show-stats "examples" || true

  semver:
    name: Semver Check
    if: github.event_name == 'pull_request'
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      with:
        fetch-depth: 0
    - name: Rust setup
      uses: ./.github/actions/rust-setup
    - name: sccache setup
      uses: ./.github/actions/sccache-setup
      with:
        bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
    - name: Cache cargo-semver-checks binary
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
      with:
        path: ~/.cargo/bin/cargo-semver-checks
        key: ${{ runner.os }}-cargo-semver-checks-${{ hashFiles('scripts/check-semver.sh', 'rust-toolchain.toml') }}
    - name: Run semver check
      env:
        SEMVER_SKIP: ${{ contains(github.event.pull_request.labels.*.name, 'semver:skip') }}
      run: bash scripts/check-semver.sh
    - name: sccache stats
      if: always()
      run: /tmp/use-sccache.sh show-stats "semver" || true

  ci-status:
    name: CI Status
    runs-on: prod-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.3
    needs: [fmt, clippy, deny, test, coverage, examples, semver]
    if: always()
    steps:
    - name: Check all jobs
      run: |
        echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. as $result | ["success", "skipped"] | any($result == .))'
