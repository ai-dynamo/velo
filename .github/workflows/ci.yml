  clippy:
    name: Clippy
    runs-on: stg-velo-default-v1
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/dynamo-ci/aws/dynamo/actions-runner/velo/default:0.0.2
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
    - name: Rust setup
      uses: ./.github/actions/rust-setup
    - name: sccache setup
      uses: ./.github/actions/sccache-setup
      with:
        bucket: ${{ secrets.SCCACHE_S3_BUCKET }}
    - name: Add clippy component
      run: rustup component list --installed | grep -q '^clippy' || rustup component add clippy
    - name: Run clippy
      run: cargo clippy --no-deps --all-features --all-targets -- -D warnings
    - name: Install cargo-machete
      run: |
        cargo-machete --version 2>/dev/null | grep -qF '0.9.1' || cargo install cargo-machete@0.9.1 --locked
    - name: Run cargo-machete
      run: cargo machete
    - name: sccache stats
      if: always()
      run: /tmp/use-sccache.sh show-stats "clippy" || true
