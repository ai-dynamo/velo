[[test]]
name = "observability_scenarios"
path = "tests/observability_scenarios.rs"
required-features = ["test-helpers"]

[[test]]
name = "transports_grpc"
path = "tests/transports/grpc_integration.rs"
required-features = ["grpc"]

[[test]]
name = "transports_nats_health"
path = "tests/transports/nats_health.rs"
