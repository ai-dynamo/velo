required-features = ["grpc"]

[[test]]
name = "streaming_mock_transport"
path = "tests/streaming/mock_transport.rs"

[[test]]
name = "streaming_mpsc_integration"
path = "tests/streaming/mpsc_integration.rs"

[[test]]
name = "streaming_mpsc_remote_integration"
path = "tests/streaming/mpsc_remote_integration.rs"

[[test]]
name = "streaming_ordering"
path = "tests/streaming/ordering.rs"

[[test]]
name = "streaming_tcp_transport"
path = "tests/streaming/tcp_transport.rs"

[[test]]
name = "streaming_timing"
path = "tests/streaming/timing.rs"

[[test]]
name = "streaming_velo_integration"
path = "tests/streaming/velo_integration.rs"

[[test]]
name = "streaming_velo_specific"
