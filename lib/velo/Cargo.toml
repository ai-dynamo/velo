[[test]]
name = "transports_nats"
path = "tests/transports/nats_integration.rs"
required-features = ["nats-transport"]

[[test]]
name = "transports_tcp"
path = "tests/transports/tcp_integration.rs"

[[test]]
name = "transports_tcp_shutdown"
path = "tests/transports/tcp_shutdown.rs"

[[test]]
name = "transports_uds_host_affinity"
path = "tests/transports/uds_host_affinity.rs"

[[test]]
name = "transports_uds"
path = "tests/transports/uds_integration.rs"

[[test]]
